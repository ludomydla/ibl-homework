<form
  [formRoot]="weatherBriefingForm"
  (submit)="submitAttempted.set(true)"
  novalidate
  class="rounded-lg border border-black p-4 mb-4 flex flex-col gap-4"
>
  <fieldset>
    <div class="flex flex-row flex-wrap">
      <legend class="w-full md:w-1/4">Message types</legend>
      <div class="w-full md:w-3/4">
        <input-checkbox id="metar" label="METAR" [field]="weatherBriefingForm.metar" />
        <input-checkbox id="sigmet" label="SIGMET" [field]="weatherBriefingForm.sigmet" />
        <input-checkbox id="taf" label="TAF" [field]="weatherBriefingForm.taf" />
      </div>
    </div>
  </fieldset>

  <input-text id="airports" label="Airports:" [field]="weatherBriefingForm.airports" />

  <input-text id="countries" label="Countries:" [field]="weatherBriefingForm.countries" />

  @if (submitAttempted() && validationMessages().length) {
    <error-alert [messages]="validationMessages()" />
  }

  <button
    type="submit"
    [disabled]="weatherBriefingForm().submitting()"
    class="self-center inline-flex items-center justify-center gap-2 rounded bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 outline-offset-2 disabled:cursor-not-allowed disabled:bg-gray-300 disabled:text-gray-500"
  >
    @if (weatherBriefingForm().submitting()) {
      <span
        class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
        aria-hidden="true"
      ></span>
      Submitting…
    } @else {
      Submit
    }
  </button>
</form>
