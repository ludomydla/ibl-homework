<form class="text-3xl flex flex-col">
    <fieldset>
        <legend>Message types</legend>

        <input type="checkbox" name="reportTypes" id="metar" value="METAR">
        <label for="metar">METAR</label>

        <input type="checkbox" name="reportTypes" id="sigmet" value="SIGMET">
        <label for="sigmet">SIGMET</label>

        <input type="checkbox" name="reportTypes" id="taf" value="TAF_LONGTAF">
        <label for="taf">TAF</label>

    <button type="submit">Submit</button>
