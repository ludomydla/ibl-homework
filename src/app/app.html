<main class="flex flex-row justify-center">
  <div class="md:w-[768px] w-full bg-slate-200 p-2 pt-4">
    <weather-briefing-form />
    @if (weatherBriefingError(); as error) {
      <error-alert [messages]="error" />
    } @else if (weatherBriefingResults(); as result) {
      <results-table [responseData]="result" />
    }
  </div>
</main>

<router-outlet />
